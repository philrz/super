spq: |
  unnest this

vector: true

input: |
  [1, "foo"]::[int64|string]
  [3, 4]::([int64]|ip)
  "bar"::(int64|string)
  null::(int64|null)

output: |
  1
  "foo"
  3
  4
  error({message:"unnest: encountered non-array value",on:"bar"})

---

spq: |
  unnest {m:"foo",a:[{m:"bar",n:{m:"baz",b:[2]}}]}

vector: true

output: |
  {m:"foo",a:{m:"bar",n:{m:"baz",b:[2]}}}

---

spq: |
  unnest {query:"foo"::(string|null),answer:["bar"]::[string|null]::(null|[string|null])}

vector: true

output: |
  {query:"foo"::(string|null),answer:"bar"}

---

spq: |
  unnest {a:0,b}

vector: true

input: |
  {b:[1]}
  {b:[2,22::(int64|null)]}
  {b:[3,33::(int64|null)::(string|(int64|null))]}
  {b:[4,44::(int64|null)::(string|(int64|null))::(bool|(string|(int64|null)))]}

output: |
  {a:0,b:1}
  {a:0,b:2}
  {a:0,b:22}
  {a:0,b:3}
  {a:0,b:33}
  {a:0,b:4}
  {a:0,b:44}
